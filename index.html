<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Сканер товаров</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card2: #1c1c1c;
      --border: rgba(255,255,255,0.07);
      --green: #00e676;
      --blue: #448aff;
      --red: #ff5252;
      --muted: #555;
      --r: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      gap: 12px;
    }

    .header { text-align: center; }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .header p  { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .status-bar { display: flex; gap: 8px; align-items: center; font-size: 12px; }
    .db-status  { color: var(--muted); }
    .db-status.ok  { color: var(--green); }
    .db-status.err { color: var(--red); }
    .net-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .net-dot.online  { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .net-dot.offline { background: #f39c12; }

    /* MODE TOGGLE */
    .mode-wrap { width: 100%; max-width: 400px; }
    .mode-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--card); border-radius: var(--r);
      border: 1px solid var(--border); padding: 4px; gap: 4px;
    }
    .mode-btn {
      padding: 11px; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, color 0.2s;
      background: transparent; color: var(--muted);
    }
    .mode-btn.active-orig { background: var(--green); color: #000; }
    .mode-btn.active-ru   { background: var(--blue);  color: #fff; }

    /* TOAST — баннер после скана (для iOS Safari) */
    .toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-120px);
      width: calc(100% - 32px); max-width: 400px;
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast a {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px; text-decoration: none; color: #000;
    }
    .toast.orig a { background: var(--green); }
    .toast.ru   a { background: var(--blue); color: #fff; }
    .toast-left {}
    .toast-label { font-size: 11px; font-weight: 600; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.8px; }
    .toast-code  { font-family: 'SF Mono', monospace; font-size: 18px; font-weight: 800; margin-top: 2px; letter-spacing: 0.5px; }
    .toast-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .toast-action { font-size: 14px; font-weight: 700; opacity: 0.8; }
    .toast-arrow  { font-size: 22px; }
    .toast-close {
      display: block; width: 100%; padding: 10px;
      text-align: center; font-size: 12px; cursor: pointer;
      background: rgba(0,0,0,0.15); border: none; color: inherit;
      font-weight: 600; letter-spacing: 0.3px;
    }
    .toast.orig .toast-close { color: rgba(0,0,0,0.5); }
    .toast.ru   .toast-close { color: rgba(255,255,255,0.5); }

    /* SCANNER */
    #reader {
      width: 100%; max-width: 400px;
      border-radius: var(--r); overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }

    .install-btn {
      display: none; padding: 11px 22px; background: var(--card);
      color: #fff; font-size: 14px; font-weight: 600;
      border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
    }

    /* ИСТОРИЯ */
    .history-wrap { width: 100%; max-width: 400px; }
    .history-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .history-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .history-clear {
      font-size: 11px; color: var(--muted); background: none;
      border: none; cursor: pointer; padding: 2px 0;
    }
    .history-clear:active { color: var(--red); }
    #historyList { display: flex; flex-direction: column; gap: 6px; }
    .h-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; text-decoration: none;
      color: inherit; transition: background 0.15s;
    }
    .h-item:active { background: var(--card2); }
    .h-left { padding: 11px 14px; flex: 1; min-width: 0; }
    .h-code {
      font-family: 'SF Mono', monospace; font-size: 15px;
      font-weight: 700; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .h-code.found { color: var(--green); }
    .h-code.notfound { color: var(--red); }
    .h-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .h-right { padding: 11px 14px; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .h-badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px;
      border-radius: 6px; white-space: nowrap;
    }
    .h-badge.orig { background: rgba(0,230,118,0.12); color: var(--green); }
    .h-badge.ru   { background: rgba(68,138,255,0.15); color: var(--blue); }
    .h-badge.miss { background: rgba(255,82,82,0.12);  color: var(--red); }
    .h-arrow { font-size: 14px; color: var(--muted); }
    .history-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 16px 0; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Сканер товаров</h1>
    <p>Наведи камеру на штрихкод</p>
  </div>

  <div class="status-bar">
    <span class="db-status" id="dbStatus">Загрузка базы...</span>
    <span class="net-dot" id="netDot"></span>
    <span id="netText" style="font-size:12px;color:var(--muted)"></span>
  </div>

  <!-- TOAST — появляется после скана, тапнуть чтобы открыть в Safari -->
  <div class="toast" id="toast">
    <a id="toastLink" href="#" target="_blank" rel="noopener noreferrer">
      <div class="toast-left">
        <div class="toast-label" id="toastLabel">Найден</div>
        <div class="toast-code"  id="toastCode"></div>
      </div>
      <div class="toast-right">
        <div class="toast-action">Открыть</div>
        <div class="toast-arrow">↗</div>
      </div>
    </a>
    <button class="toast-close" onclick="dismissToast()">закрыть</button>
  </div>

  <div class="mode-wrap">
    <div class="mode-toggle">
      <button class="mode-btn active-orig" id="btn-orig" onclick="setMode('original')">🌐 Оригинал</button>
      <button class="mode-btn"             id="btn-ru"   onclick="setMode('russian')">🇷🇺 Русский</button>
    </div>
  </div>

  <button class="install-btn" id="installBtn">Установить приложение</button>

  <div id="reader"></div>

  <div class="history-wrap" id="historyWrap" style="display:none">
    <div class="history-header">
      <span class="history-title">История сессии</span>
      <button class="history-clear" onclick="clearHistory()">очистить</button>
    </div>
    <div id="historyList"></div>
  </div>

  <script>
    // ── SW ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js?v=18')
        .then(() => console.log('SW ok'))
        .catch(e => console.error(e));
    }

    // ── СЕТЬ ──
    function updateNet() {
      const dot = document.getElementById('netDot');
      const txt = document.getElementById('netText');
      if (navigator.onLine) {
        dot.className = 'net-dot online'; txt.textContent = 'онлайн';
      } else {
        dot.className = 'net-dot offline'; txt.textContent = 'офлайн';
      }
    }
    updateNet();
    window.addEventListener('online', updateNet);
    window.addEventListener('offline', updateNet);

    // ── INSTALL ──
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'block';
    });
    document.getElementById('installBtn').addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          document.getElementById('installBtn').style.display = 'none';
        });
      }
    });

    // ── РЕЖИМ ──
    let currentMode = 'original';
    function setMode(m) {
      currentMode = m;
      document.getElementById('btn-orig').className = 'mode-btn' + (m === 'original' ? ' active-orig' : '');
      document.getElementById('btn-ru').className   = 'mode-btn' + (m === 'russian'  ? ' active-ru'   : '');
    }

    // ── CSV — добавляем timestamp чтобы всегда получать свежие данные ──
    const CSV_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpRYWo3PdDGmKTiUW97_zx1BcbtPYZKy0VeifwKLBA0J8oO-DCNyfx3Fbgh81psypZQ6bIG3lsNtmS/pub?gid=0&single=true&output=csv';
    let products = {};

    function parseCSVLine(line) {
      const fields = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      fields.push(cur.trim());
      return fields;
    }

    function parseCSV(csv) {
      const lines = csv.split('\n');
      let count = 0;
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const parts = parseCSVLine(line);
        if (parts.length < 2) continue;
        const code = parts[0].replace(/"/g, '').trim();
        const url  = parts[1].replace(/"/g, '').trim();
        if (code && url) { products[code] = url; count++; }
      }
      return count;
    }

    function setDbStatus(ok, text) {
      const el = document.getElementById('dbStatus');
      el.className = 'db-status ' + (ok ? 'ok' : 'err');
      el.textContent = text;
    }

    // Пробуем с timestamp (обход кэша), при ошибке — без него
    fetch(CSV_BASE + '&t=' + Date.now())
      .catch(() => fetch(CSV_BASE))
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(csv => {
        const n = parseCSV(csv);
        setDbStatus(true, 'База: ' + n + ' товаров');
      })
      .catch(err => {
        setDbStatus(false, 'Ошибка загрузки базы');
        console.error('CSV error:', err);
      });

    // ── ИСТОРИЯ ──
    const sessionHistory = [];

    function addToHistory(code, rawUrl, mode, openUrl) {
      const now = new Date();
      const time = now.getHours().toString().padStart(2,'0') + ':' +
                   now.getMinutes().toString().padStart(2,'0') + ':' +
                   now.getSeconds().toString().padStart(2,'0');
      sessionHistory.unshift({ code, rawUrl, mode, openUrl, time, found: !!rawUrl });
      renderHistory();
    }

    function renderHistory() {
      const wrap = document.getElementById('historyWrap');
      const list = document.getElementById('historyList');
      if (!sessionHistory.length) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      list.innerHTML = sessionHistory.map(item => {
        if (item.found) {
          const badge = item.mode === 'russian'
            ? '<span class="h-badge ru">🇷🇺 рус</span>'
            : '<span class="h-badge orig">🌐 ориг</span>';
          return '<a class="h-item" href="' + item.openUrl + '" target="_blank" rel="noopener noreferrer">' +
            '<div class="h-left">' +
              '<div class="h-code found">' + item.code + '</div>' +
              '<div class="h-time">' + item.time + '</div>' +
            '</div>' +
            '<div class="h-right">' + badge + '<span class="h-arrow">↗</span></div>' +
          '</a>';
        } else {
          return '<div class="h-item">' +
            '<div class="h-left">' +
              '<div class="h-code notfound">' + item.code + '</div>' +
              '<div class="h-time">' + item.time + '</div>' +
            '</div>' +
            '<div class="h-right"><span class="h-badge miss">не найден</span></div>' +
          '</div>';
        }
      }).join('');
    }

    function clearHistory() {
      sessionHistory.length = 0;
      renderHistory();
    }

    // ── ОПРЕДЕЛЕНИЕ ПЛАТФОРМЫ ──
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // ── TOAST (только на iOS — на Android window.open работает без него) ──
    let toastTimer = null;

    function showToast(code, openUrl, mode) {
      const toast = document.getElementById('toast');
      const link  = document.getElementById('toastLink');
      document.getElementById('toastLabel').textContent = mode === 'russian' ? '🇷🇺 Русский' : '🌐 Оригинал';
      document.getElementById('toastCode').textContent  = code;
      link.href = openUrl;
      toast.className = 'toast ' + (mode === 'russian' ? 'ru' : 'orig');
      // показываем
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { toast.classList.add('show'); });
      });
      // закрываем через 8 сек если не тапнули
      clearTimeout(toastTimer);
      toastTimer = setTimeout(dismissToast, 8000);
      // Закрываем сразу после тапа по ссылке
      link.onclick = () => { setTimeout(dismissToast, 300); };
    }

    function dismissToast() {
      clearTimeout(toastTimer);
      document.getElementById('toast').classList.remove('show');
    }

    // ── СКАНЕР ──
    let lastScanned = '';

    // Когда возвращаемся на вкладку — сбрасываем через 2с
    // (даём камере время перефокусироваться, чтобы не подхватить старый кадр)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        setTimeout(() => { lastScanned = ''; }, 2000);
      }
    });

    function onScanSuccess(decodedText) {
      if (decodedText === lastScanned) return;  // тот же код — игнор
      lastScanned = decodedText;
      if (navigator.vibrate) navigator.vibrate(80);

      const rawUrl = products[decodedText];

      if (rawUrl) {
        const ruUrl   = 'https://translate.google.com/translate?sl=auto&tl=ru&u=' + encodeURIComponent(rawUrl);
        const openUrl = currentMode === 'russian' ? ruUrl : rawUrl;
        addToHistory(decodedText, rawUrl, currentMode, openUrl);
        if (isIOS) {
          // iOS Safari блокирует window.open из коллбэка — показываем баннер для тапа
          showToast(decodedText, openUrl, currentMode);
        } else {
          // Android/Desktop — открывается автоматически
          window.open(openUrl, '_blank');
        }
      } else {
        addToHistory(decodedText, null, currentMode, null);
      }
    }

    const SCAN_CONFIG = {
      fps: 25,
      qrbox: { width: 300, height: 130 },
      experimentalFeatures: {
        useBarCodeDetectorIfSupported: true  // нативный API на iOS17+/Android — в разы быстрее
      },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.QR_CODE
      ]
    };

    const scanner = new Html5Qrcode("reader");

    // frameRate: просим камеру давать больше кадров в секунду (iOS по умолчанию скупится)
    const CAM_CONSTRAINT = {
      facingMode: { exact: 'environment' },
      frameRate: { ideal: 30, min: 15 }
    };

    scanner.start(CAM_CONSTRAINT, SCAN_CONFIG, onScanSuccess, null)
      .catch(() => {
        scanner.start({ facingMode: 'environment' }, SCAN_CONFIG, onScanSuccess, null)
          .catch(() => {
            document.getElementById('reader').innerHTML =
              '<p style="color:var(--red);padding:20px;text-align:center">Нет доступа к камере</p>';
          });
      });
  </script>

</body>
</html>
