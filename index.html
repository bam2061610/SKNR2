<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Сканер товаров</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card2: #1c1c1c;
      --border: rgba(255,255,255,0.07);
      --green: #00e676;
      --blue: #448aff;
      --red: #ff5252;
      --muted: #555;
      --r: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      gap: 12px;
    }

    .header { text-align: center; }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .header p  { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .status-bar { display: flex; gap: 8px; align-items: center; font-size: 12px; }
    .db-status  { color: var(--muted); }
    .db-status.ok  { color: var(--green); }
    .db-status.err { color: var(--red); }
    .net-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .net-dot.online  { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .net-dot.offline { background: #f39c12; }

    /* MODE TOGGLE */
    .mode-wrap { width: 100%; max-width: 400px; }
    .mode-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--card); border-radius: var(--r);
      border: 1px solid var(--border); padding: 4px; gap: 4px;
    }
    .mode-btn {
      padding: 11px; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, color 0.2s;
      background: transparent; color: var(--muted);
    }
    .mode-btn.active-orig { background: var(--green); color: #000; }
    .mode-btn.active-ru   { background: var(--blue);  color: #fff; }

    /* LAST SCAN */
    .last-scan {
      width: 100%; max-width: 400px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      min-height: 54px;
    }
    .last-scan .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .last-scan .code  { font-family: 'SF Mono', monospace; font-size: 17px; font-weight: 700; color: var(--green); margin-top: 2px; }
    .last-scan .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 8px; }
    .badge-ok { background: rgba(0,230,118,0.15); color: var(--green); }
    .badge-no { background: rgba(255,82,82,0.15);  color: var(--red); }
    .last-scan .empty { font-size: 13px; color: var(--muted); margin: auto; }

    /* SCANNER */
    #reader {
      width: 100%; max-width: 400px;
      border-radius: var(--r); overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }

    .install-btn {
      display: none; padding: 11px 22px; background: var(--card);
      color: #fff; font-size: 14px; font-weight: 600;
      border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Сканер товаров</h1>
    <p>Наведи камеру на штрихкод</p>
  </div>

  <div class="status-bar">
    <span class="db-status" id="dbStatus">Загрузка базы...</span>
    <span class="net-dot" id="netDot"></span>
    <span id="netText" style="font-size:12px;color:var(--muted)"></span>
  </div>

  <div class="mode-wrap">
    <div class="mode-toggle">
      <button class="mode-btn active-orig" id="btn-orig" onclick="setMode('original')">🌐 Оригинал</button>
      <button class="mode-btn"             id="btn-ru"   onclick="setMode('russian')">🇷🇺 Русский</button>
    </div>
  </div>

  <div class="last-scan" id="lastScan">
    <span class="empty">Ещё ничего не отсканировано</span>
  </div>

  <button class="install-btn" id="installBtn">Установить приложение</button>

  <div id="reader"></div>

  <script>
    // ── SW ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js?v=11')
        .then(() => console.log('SW ok'))
        .catch(e => console.error(e));
    }

    // ── СЕТЬ ──
    function updateNet() {
      const dot = document.getElementById('netDot');
      const txt = document.getElementById('netText');
      if (navigator.onLine) {
        dot.className = 'net-dot online'; txt.textContent = 'онлайн';
      } else {
        dot.className = 'net-dot offline'; txt.textContent = 'офлайн';
      }
    }
    updateNet();
    window.addEventListener('online', updateNet);
    window.addEventListener('offline', updateNet);

    // ── INSTALL ──
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'block';
    });
    document.getElementById('installBtn').addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          document.getElementById('installBtn').style.display = 'none';
        });
      }
    });

    // ── РЕЖИМ ──
    let currentMode = 'original';
    function setMode(m) {
      currentMode = m;
      document.getElementById('btn-orig').className = 'mode-btn' + (m === 'original' ? ' active-orig' : '');
      document.getElementById('btn-ru').className   = 'mode-btn' + (m === 'russian'  ? ' active-ru'   : '');
    }

    // ── CSV ──
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpRYWo3PdDGmKTiUW97_zx1BcbtPYZKy0VeifwKLBA0J8oO-DCNyfx3Fbgh81psypZQ6bIG3lsNtmS/pub?gid=0&single=true&output=csv';
    let products = {};

    function parseCSVLine(line) {
      const fields = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      fields.push(cur.trim());
      return fields;
    }

    fetch(CSV_URL)
      .then(r => r.text())
      .then(csv => {
        const lines = csv.split('\n');
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const parts = parseCSVLine(line);
          if (parts.length < 2) continue;
          const code = parts[0].replace(/"/g, '').trim();
          const url  = parts[1].replace(/"/g, '').trim();
          if (code && url) products[code] = url;
        }
        const n = Object.keys(products).length;
        const el = document.getElementById('dbStatus');
        el.className = 'db-status ok';
        el.textContent = 'База: ' + n + ' товаров';
      })
      .catch(() => {
        const el = document.getElementById('dbStatus');
        el.className = 'db-status err';
        el.textContent = 'База из кэша';
      });

    // ── СКАНЕР ──
    let lastScanned = '';
    let blocked = false;  // блокировка на 5 сек после каждого открытия

    function onScanSuccess(decodedText) {
      if (blocked) return;
      if (decodedText === lastScanned) return;
      lastScanned = decodedText;
      blocked = true;
      setTimeout(() => { blocked = false; }, 5000);
      if (navigator.vibrate) navigator.vibrate(80);

      const rawUrl = products[decodedText];
      const box    = document.getElementById('lastScan');

      if (rawUrl) {
        const ruUrl   = 'https://translate.google.com/translate?sl=auto&tl=ru&u=' + encodeURIComponent(rawUrl);
        const openUrl = currentMode === 'russian' ? ruUrl : rawUrl;
        const modeTag = currentMode === 'russian' ? '🇷🇺 рус' : '🌐 ориг';

        box.innerHTML =
          '<div>' +
            '<div class="label">Открыто</div>' +
            '<div class="code">' + decodedText + '</div>' +
          '</div>' +
          '<span class="badge badge-ok">' + modeTag + '</span>';

        // Автооткрытие — один раз, повтор исключён т.к. lastScanned не сбрасывается
        window.open(openUrl, '_blank');
      } else {
        box.innerHTML =
          '<div>' +
            '<div class="label">Не найден</div>' +
            '<div class="code" style="color:var(--red)">' + decodedText + '</div>' +
          '</div>' +
          '<span class="badge badge-no">нет в базе</span>';
      }
    }

    // Используем низкоуровневый Html5Qrcode — без лишних кнопок/UI
    const scanner = new Html5Qrcode("reader");
    Html5Qrcode.getCameras()
      .then(cameras => {
        if (!cameras || !cameras.length) return;
        // Предпочитаем заднюю камеру
        const cam = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];
        return scanner.start(
          { deviceId: { exact: cam.id } },
          {
            fps: 10,
            qrbox: { width: 300, height: 130 },
            formatsToSupport: [
              Html5QrcodeSupportedFormats.EAN_13,
              Html5QrcodeSupportedFormats.EAN_8,
              Html5QrcodeSupportedFormats.CODE_128,
              Html5QrcodeSupportedFormats.CODE_39,
              Html5QrcodeSupportedFormats.UPC_A,
              Html5QrcodeSupportedFormats.UPC_E,
              Html5QrcodeSupportedFormats.QR_CODE
            ]
          },
          onScanSuccess,
          null
        );
      })
      .catch(() => {
        // Fallback — facingMode environment
        scanner.start(
          { facingMode: 'environment' },
          {
            fps: 10,
            qrbox: { width: 300, height: 130 },
            formatsToSupport: [
              Html5QrcodeSupportedFormats.EAN_13,
              Html5QrcodeSupportedFormats.EAN_8,
              Html5QrcodeSupportedFormats.CODE_128,
              Html5QrcodeSupportedFormats.CODE_39,
              Html5QrcodeSupportedFormats.UPC_A,
              Html5QrcodeSupportedFormats.UPC_E,
              Html5QrcodeSupportedFormats.QR_CODE
            ]
          },
          onScanSuccess,
          null
        ).catch(e => {
          document.getElementById('reader').innerHTML =
            '<p style="color:var(--red);padding:20px;text-align:center">Нет доступа к камере</p>';
        });
      });
  </script>

</body>
</html>
