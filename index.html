<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер товаров</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 10px; text-align: center; }
    #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; }
    #result {
      margin-top: 20px; padding: 20px; background: #16213e;
      border-radius: 12px; width: 100%; max-width: 400px;
      text-align: center; min-height: 80px;
    }
    #result.found { background: #0a3d2a; border: 2px solid #2ecc71; }
    #result.notfound { background: #3d0a0a; border: 2px solid #e74c3c; }
    .barcode-number {
      font-size: 24px; font-weight: bold;
      font-family: monospace; color: #2ecc71; margin-bottom: 12px;
    }
    .status { font-size: 16px; margin-bottom: 12px; }
    .waiting { color: #888; font-size: 16px; }
    .open-btn {
      display: inline-block; padding: 14px 28px; background: #2ecc71;
      color: #000; font-size: 18px; font-weight: bold;
      border-radius: 10px; text-decoration: none; margin-top: 10px;
    }
    .scan-again {
      display: inline-block; padding: 10px 20px; background: #16213e;
      color: #fff; font-size: 14px; border: 1px solid #444;
      border-radius: 8px; margin-top: 12px; cursor: pointer;
    }
    .status-bar {
      display: flex; gap: 10px; margin-bottom: 15px;
      font-size: 12px; align-items: center;
    }
    .db-status { color: #555; }
    .db-status.ok { color: #2ecc71; }
    .db-status.err { color: #e74c3c; }
    .net-status { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .net-status.online { background: #0a3d2a; color: #2ecc71; }
    .net-status.offline { background: #3d2a0a; color: #f39c12; }
    #reader select, #reader button {
      background: #16213e !important; color: #fff !important;
      border: 1px solid #333 !important; border-radius: 6px !important;
      padding: 8px 12px !important;
    }
    .install-btn {
      display: none; padding: 10px 20px; background: #3498db;
      color: #fff; font-size: 14px; border: none;
      border-radius: 8px; margin-bottom: 15px; cursor: pointer;
    }
    .mode-toggle {
      display: flex; gap: 12px; margin-bottom: 14px;
      background: #16213e; border-radius: 10px; padding: 8px 16px;
    }
    .mode-label {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; font-size: 14px; color: #aaa;
      user-select: none;
    }
    .mode-label input[type="radio"] { display: none; }
    .mode-label span {
      padding: 5px 14px; border-radius: 7px;
      border: 1px solid #333; transition: all 0.2s;
    }
    .mode-label input[type="radio"]:checked + span {
      background: #2ecc71; color: #000;
      border-color: #2ecc71; font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>📷 Сканер товаров</h1>
  <p class="subtitle">Наведи камеру на штрихкод товара</p>

  <div class="mode-toggle">
    <label class="mode-label">
      <input type="radio" name="mode" value="original" checked>
      <span>Оригинал</span>
    </label>
    <label class="mode-label">
      <input type="radio" name="mode" value="russian">
      <span>Русский</span>
    </label>
  </div>

  <div class="status-bar">
    <span class="db-status" id="dbStatus">Загрузка базы...</span>
    <span class="net-status" id="netStatus"></span>
  </div>

  <button class="install-btn" id="installBtn">Установить приложение</button>

  <div id="reader"></div>

  <div id="result">
    <span class="waiting">Ожидаю штрихкод...</span>
  </div>

  <script>
    // =============================================
    // РЕГИСТРАЦИЯ SERVICE WORKER
    // =============================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('SW зарегистрирован'))
        .catch(err => console.error('SW ошибка:', err));
    }

    // =============================================
    // СТАТУС СЕТИ
    // =============================================
    function updateNetStatus() {
      const el = document.getElementById('netStatus');
      if (navigator.onLine) {
        el.className = 'net-status online';
        el.textContent = 'онлайн';
      } else {
        el.className = 'net-status offline';
        el.textContent = 'офлайн';
      }
    }
    updateNetStatus();
    window.addEventListener('online', updateNetStatus);
    window.addEventListener('offline', updateNetStatus);

    // =============================================
    // КНОПКА УСТАНОВКИ PWA
    // =============================================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'block';
    });
    document.getElementById('installBtn').addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          document.getElementById('installBtn').style.display = 'none';
        });
      }
    });

    // =============================================
    // ЗАГРУЗКА БАЗЫ ИЗ GOOGLE SHEETS CSV
    // =============================================
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpRYWo3PdDGmKTiUW97_zx1BcbtPYZKy0VeifwKLBA0J8oO-DCNyfx3Fbgh81psypZQ6bIG3lsNtmS/pub?gid=0&single=true&output=csv';

    let products = {};

    function parseCSVLine(line) {
      const fields = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      fields.push(cur.trim());
      return fields;
    }

    fetch(CSV_URL)
      .then(r => r.text())
      .then(csv => {
        const lines = csv.split('\n');
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const parts = parseCSVLine(line);
          if (parts.length < 2) continue;
          const code = parts[0].replace(/"/g, '').trim();
          const url = parts[1].replace(/"/g, '').trim();
          if (code && url) products[code] = url;
        }
        const count = Object.keys(products).length;
        document.getElementById('dbStatus').className = 'db-status ok';
        document.getElementById('dbStatus').textContent = 'База: ' + count + ' товаров';
      })
      .catch(() => {
        document.getElementById('dbStatus').className = 'db-status err';
        document.getElementById('dbStatus').textContent = 'База из кэша';
      });

    // =============================================
    // СКАНЕР
    // =============================================
    let lastScanned = '';

    function getMode() {
      const checked = document.querySelector('input[name="mode"]:checked');
      return checked ? checked.value : 'original';
    }

    function buildOpenUrl(rawUrl) {
      if (getMode() === 'russian') {
        return 'https://translate.yandex.ru/translate?url=' + encodeURIComponent(rawUrl) + '&lang=auto-ru';
      }
      return rawUrl;
    }

    function onScanSuccess(decodedText) {
      if (decodedText === lastScanned) return;
      lastScanned = decodedText;
      if (navigator.vibrate) navigator.vibrate(100);

      const result = document.getElementById('result');
      const rawUrl = products[decodedText];

      if (rawUrl) {
        const openUrl = buildOpenUrl(rawUrl);
        const modeLabel = getMode() === 'russian' ? 'Открыть (рус.)' : 'Открыть товар';
        result.className = 'found';
        result.innerHTML =
          '<div class="barcode-number">' + decodedText + '</div>' +
          '<div class="status">Найден! Открываю...</div>' +
          '<a class="open-btn" href="' + openUrl + '" target="_blank">' + modeLabel + '</a>' +
          '<div><span class="scan-again" onclick="resetScan()">Сканировать ещё</span></div>';
        window.open(openUrl, '_blank');
      } else {
        result.className = 'notfound';
        result.innerHTML =
          '<div class="barcode-number">' + decodedText + '</div>' +
          '<div class="status">Товар не найден в базе</div>' +
          '<div><span class="scan-again" onclick="resetScan()">Сканировать ещё</span></div>';
      }
    }

    function resetScan() {
      lastScanned = '';
      document.getElementById('result').className = '';
      document.getElementById('result').innerHTML = '<span class="waiting">Ожидаю штрихкод...</span>';
    }

    new Html5QrcodeScanner("reader", {
      fps: 10,
      qrbox: { width: 250, height: 150 },
      supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
      rememberLastUsedCamera: true,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.QR_CODE
      ]
    }).render(onScanSuccess, function(){});
  </script>

</body>
</html>
